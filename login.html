<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>log in — kervan</title>
<meta name="description" content="Log in to kervan to save your builds and check out faster.">
<meta name="theme-color" content="#E8EBED">
<script>
  /* season — apply before paint so there's no flash of the wrong mode */
  (function () {
    try {
      var s = localStorage.getItem("kervan-season");
      document.documentElement.dataset.season = (s === "winter") ? "winter" : "summer";
    } catch (e) {
      document.documentElement.dataset.season = "summer";
    }
  })();
</script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M6 4 L28 11 L6 18 Z' fill='%23FF471D'/%3E%3Crect x='5' y='4' width='2.5' height='26' rx='1' fill='%2316191C'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="nav" aria-label="Main">
  <div class="nav-pill">
    <a class="nav-brand" href="index.html">kervan
      <svg viewBox="0 0 14 14" aria-hidden="true"><path d="M2 1 L13 5 L2 9 Z" fill="#FF471D"/><rect x="1.2" y="1" width="1.6" height="12" rx="0.8" fill="#16191C"/></svg>
    </a>
    <a class="nav-login" href="index.html">← back to site</a>
  </div>
</nav>

<main class="auth">
  <div class="auth-card">
    <p class="eyebrow">members · your builds, saved</p>
    <h1 class="auth-title">welcome back.</h1>
    <p class="auth-sub">Log in to save your trailer builds and breeze through checkout. This is a demo — any details will do.</p>
    <form id="login-form" novalidate>
      <div class="field">
        <label class="field-label" for="login-name">Name</label>
        <input type="text" id="login-name" autocomplete="given-name" placeholder="What should we call you?">
      </div>
      <div class="field">
        <label class="field-label" for="login-email">Email</label>
        <input type="email" id="login-email" autocomplete="email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label class="field-label" for="login-pass">Password</label>
        <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">
      </div>
      <p class="form-error" id="login-error"></p>
      <button type="submit" class="btn btn--flag auth-submit">Log in</button>
    </form>
    <p class="auth-foot">Just browsing? <a href="index.html">Start building →</a></p>
  </div>
</main>

<script>
  document.getElementById("login-form").addEventListener("submit", function (e) {
    e.preventDefault();
    var name = document.getElementById("login-name").value.trim();
    if (!name) {
      document.getElementById("login-error").textContent = "Pop in a name so we can say hello.";
      document.getElementById("login-name").focus();
      return;
    }
    try { localStorage.setItem("kervan-name", name); } catch (err) {}
    window.location.href = "index.html";
  });
</script>
</body>
</html>
